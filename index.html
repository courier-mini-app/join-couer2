<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Заявка курьера</title>
    <!-- Подключаем скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--tg-theme-bg-color, #fff);
        color: var(--tg-theme-text-color, #000);
        margin: 0;
        padding: 20px;
      }
      .form-group { margin-bottom: 15px; }
      label { display: block; margin-bottom: 5px; font-weight: 500; }
      input, textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--tg-theme-hint-color, #ccc);
        border-radius: 8px;
        box-sizing: border-box;
        background-color: var(--tg-theme-secondary-bg-color, #f4f4f4);
        color: var(--tg-theme-text-color, #000);
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: var(--tg-theme-button-color, #2481cc);
        color: var(--tg-theme-button-text-color, #fff);
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }
      button:active { opacity: 0.8; }
    </style>
  </head>
  <body>
    <h2>Новая заявка</h2>
    <div class="form-group">
      <label for="name">Имя</label>
      <input type="text" id="name" placeholder="Ваше имя" />
    </div>
    <div class="form-group">
      <label for="phone">Телефон</label>
      <input type="tel" id="phone" placeholder="+7 (999) 000-00-00" />
    </div>
    <div class="form-group">
      <label for="comment">Комментарий</label>
      <textarea id="comment" rows="3" placeholder="Детали заказа"></textarea>
    </div>
    <button id="submitBtn">Отправить заявку</button>

    <script>
      const tg = window.Telegram.WebApp;
      tg.ready();

      document.getElementById('submitBtn').addEventListener('click', () => {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const comment = document.getElementById('comment').value.trim();

        // Проверка на заполненность
        if (!name || !phone) {
          tg.showAlert('Пожалуйста, заполните имя и телефон!');
          return;
        }

        const data = {
          name: name,
          phone: phone,
          comment: comment || 'Нет комментария',
          userId: tg.initDataUnsafe?.user?.id,
          username: tg.initDataUnsafe?.user?.username,
          firstName: tg.initDataUnsafe?.user?.first_name
        };

        const message = `Новая заявка!
Имя: \${name}
Телефон: \${phone}
Комментарий: \${data.comment}

Клиент: @${data.username || 'не указан'} (ID: ${data.userId || 'неизвестен'})`;

        // Здесь ты можешь добавить отправку на свой сервер
        console.log('Данные для отправки:', data);
        
        tg.showAlert(message);
        tg.close();
      });
    </script>
  </body>
</html>
