<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
        padding: 16px;
        background: var(--tg-theme-bg-color, #fff);
        color: var(--tg-theme-text-color, #000);
      }

      h2 { margin-top: 0; }
      .form-group { margin-bottom: 14px; }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
      }

      input, select, textarea {
        width: 100%;
        box-sizing: border-box; 
        padding: 16px;
        font-size: 16px;
        margin-bottom: 12px;
        background-color: #f5f5f5;
        border: 1px solid #ccc;
        border-radius: 8px;
      }

      button {
        width: 100%;
        padding: 16px;
        font-size: 16px;
        min-height: 48px; 
        cursor: pointer;
        background-color: #2481cc;
        color: white;
        border: none;
        border-radius: 8px;
      }

      .error {
        color: #d9534f;
        margin-top: 10px;
        display: none;
      }

      .thank-you-screen {
        text-align: center;
        padding: 32px 16px;
        display: none;
      }
      .thank-you-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }
      .thank-you-btn {
        margin-top: 20px;
        width: 100%;
        padding: 12px;
        background: var(--tg-theme-button-color, #2481cc);
        color: var(--tg-theme-button-text-color, #fff);
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="form-screen">
      <h2>Заявка на подключение</h2>
      <p style="color: var(--tg-theme-hint-color, #888); font-size: 14px;">
        Покажем реальные условия и первый слот без «обещаний 100к».
      </p>

      <form id="leadForm">
        <div class="form-group">
          <label>Имя</label>
          <input type="text" name="name" required placeholder="Иван" />
        </div>
        <div class="form-group">
          <label>Город</label>
          <select name="city" required>
            <option value="" disabled selected>Выбери город</option>
            <option value="Москва">Москва</option>
            <option value="Санкт-Петербург">Санкт-Петербург</option>
            <option value="Казань">Казань</option>
            <option value="Екатеринбург">Екатеринбург</option>
            <option value="Другой">Другой</option>
          </select>
        </div>
        <div class="form-group">
          <label>Тип транспорта</label>
          <select name="transport" required>
            <option value="" disabled selected>Выбери вариант</option>
            <option value="авто">Авто</option>
            <option value="велосипед">Велосипед</option>
            <option value="пешком">Пешком</option>
          </select>
        </div>
        <div class="form-group">
          <label>Готовность по времени</label>
          <select name="time" required>
            <option value="" disabled selected>Выбери вариант</option>
            <option value="2-4 часа">2–4 часа (подработка)</option>
            <option value="полный день">Полный день</option>
            <option value="по выходным">По выходным</option>
          </select>
        </div>
        <div class="form-group">
          <label>Телефон</label>
          <input type="tel" name="phone" placeholder="+7 (999) 000-00-00" />
        </div>
        <div class="form-group">
          <label style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" name="agree" required />
            Согласен на обработку персональных данных
          </label>
        </div>
        <button type="submit" id="submitBtn">Отправить заявку</button>
        <div id="error" class="error">Ошибка отправки. Попробуй ещё раз.</div>
      </form>
    </div>

    <div id="thank-you-screen" class="thank-you-screen">
      <div class="thank-you-icon">✅</div>
      <h2>Спасибо за заявку!</h2>
      <p>Мы получили твои данные. Скоро с тобой свяжутся.</p>
      <button id="close-app-btn" class="thank-you-btn">Закрыть</button>
    </div>

  <section style="max-width: 500px; margin: 40px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; font-family: Arial, sans-serif;">
    <h3>Оставить заявку</h3>
    <form id="contact-form">
      <div style="margin-bottom: 12px;">
        <input type="text" name="name" placeholder="Ваше имя" style="width: 100%; padding: 8px; box-sizing: border-box;" required>
      </div>
      <div style="margin-bottom: 12px;">
        <input type="tel" name="phone" placeholder="Телефон" style="width: 100%; padding: 8px; box-sizing: border-box;" required>
      </div>
      <div style="margin-bottom: 16px;">
        <textarea name="comment" placeholder="Комментарий (необязательно)" style="width: 100%; height: 80px; padding: 8px; box-sizing: border-box;"></textarea>
      </div>
      <button type="submit" style="padding: 10px 20px; background: #2481cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">Отправить</button>
      <div id="form-status" style="margin-top: 10px; font-weight: bold;"></div>
    </form>
  </section>

  <script>
    const form = document.getElementById('contact-form');
    const status = document.getElementById('form-status');
    const token = '8210084489:AAFp6lHpwllrgr4I8k4oP4XLmXSzjJxYiuM'; 
    const chatId = '8552923035'; 

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.textContent = 'Отправляем...';
      status.style.color = '#2481cc';

      const formData = new FormData(form);
      const name = formData.get('name');
      const phone = formData.get('phone');
      const comment = formData.get('comment') || '—';

      const text = `📬 Новая заявка с сайта!\n\nИмя: ${name}\nТелефон: ${phone}\nКомментарий: \${comment}`;

      const payload = {
        chat_id: chatId,
        text: text,
        parse_mode: 'HTML'
      };

      try {
        const response = await fetch(`https://api.telegram.org/bot\${token}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          status.textContent = '✅ Заявка отправлена! Спасибо.';
          status.style.color = 'green';
          form.reset();
        } else {
          status.textContent = '❌ Ошибка отправки. Попробуйте позже.';
          status.style.color = 'red';
          console.error('Telegram API error:', response.status, response.statusText);
        }
      } catch (err) {
        status.textContent = '❌ Ошибка сети. Проверьте консоль (F12).';
        status.style.color = 'red';
        console.error(err);
      }
    });
  </script>
</body>
</html>
